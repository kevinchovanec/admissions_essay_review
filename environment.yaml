name: essay-assessment-eda

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core data
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.11.0
  - statsmodels>=0.14.0
  - openpyxl>=3.1.0

  # ML
  - scikit-learn>=1.3.0

  # PyTorch — installs CUDA build automatically via the pytorch channel
  - pytorch>=2.2.0
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.13.0
  - plotly>=5.18.0

  # Misc
  - tqdm>=4.66.0

  - pip:
    - sentence-transformers>=3.0.0
    - transformers>=4.40.0
    - datasets>=2.18.0
    - accelerate>=0.29.0
    - bertopic>=0.16.0
    - umap-learn>=0.5.6
    - hdbscan>=0.8.33
    - spacy>=3.7.0
    - lexicalrichness>=0.5.1

# --- Post-install steps ---
# spaCy English model (run once after activating the environment):
#   python -m spacy download en_core_web_sm
